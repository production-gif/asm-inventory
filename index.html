<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AMERICAN STAR — WMS Nệm</title>

<!-- ===== THƯ VIỆN QUA CDN (open-source) ===== -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  /* ===== TOKEN THƯƠNG HIỆU — DỄ CHỈNH ===== */
  :root{
    --navy:#0E2148; --navy-2:#1B356B; --red:#C8102E; --red-2:#E11D33;
    --green:#15A34A; --amber:#F59E0B; --bg:#EEF2F7; --card:#FFFFFF;
    --line:#E2E8F0; --ink:#0F172A; --muted:#64748B; --sidebar-w:264px;
  }
  *{font-family:'Inter',system-ui,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

  /* ===== BUTTONS ===== */
  .btn{min-height:52px;padding:0 18px;border-radius:14px;font-weight:700;font-size:16px;display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:.14s;cursor:pointer;border:none;user-select:none}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;box-shadow:0 6px 16px -6px rgba(14,33,72,.6)}
  .btn-red{background:linear-gradient(135deg,var(--red),var(--red-2));color:#fff;box-shadow:0 6px 16px -6px rgba(200,16,46,.5)}
  .btn-green{background:var(--green);color:#fff}
  .btn-amber{background:var(--amber);color:#fff}
  .btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .btn-lg{min-height:78px;font-size:21px;border-radius:18px;width:100%}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 2px 10px -4px rgba(15,23,42,.08)}
  .num{font-size:32px;font-weight:900;line-height:1;letter-spacing:-.02em}
  input,select,textarea{font-size:16px;outline:none}
  .field{width:100%;min-height:50px;border:1.5px solid var(--line);border-radius:12px;padding:0 14px;background:#fff;transition:.12s}
  .field:focus{border-color:var(--navy-2);box-shadow:0 0 0 3px rgba(27,53,107,.12)}
  table{border-collapse:collapse;width:100%}
  thead th{position:sticky;top:0;background:#F8FAFC;z-index:1;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);cursor:default}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:14.5px}
  tbody tr:hover{background:#F8FAFC}
  .pill{padding:3px 11px;border-radius:999px;font-size:12px;font-weight:700;display:inline-block}
  .sectiontitle{font-size:20px;font-weight:800;letter-spacing:-.01em}

  /* ===== LOGO VECTOR ===== */
  .logo-lockup{display:flex;align-items:center;gap:10px}
  .logo-word{font-weight:900;letter-spacing:.02em;line-height:1;white-space:nowrap}
  .logo-word .a{color:var(--navy)} .logo-word .s{color:var(--red)}
  .on-dark .logo-word .a{color:#fff}

  /* ===== SIDEBAR ===== */
  #sidebar{position:fixed;top:0;left:0;height:100%;width:var(--sidebar-w);background:linear-gradient(180deg,#0B1A3A,#13294B);color:#cbd5e1;z-index:50;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column}
  #sidebar.open{transform:none}
  .sbrand{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
  .sbgroup{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#7c8db5;padding:16px 20px 6px}
  .sbitem{display:flex;align-items:center;gap:12px;padding:12px 18px;margin:2px 10px;border-radius:12px;font-weight:600;font-size:15px;color:#c7d2e4;cursor:pointer;transition:.12s}
  .sbitem:hover{background:rgba(255,255,255,.07);color:#fff}
  .sbitem.active{background:linear-gradient(135deg,var(--red),var(--red-2));color:#fff;box-shadow:0 8px 18px -8px rgba(200,16,46,.7)}
  .sbitem .ic{width:24px;text-align:center;font-size:18px}
  #backdrop{position:fixed;inset:0;background:rgba(8,15,35,.5);backdrop-filter:blur(2px);z-index:45;display:none}
  #backdrop.show{display:block}

  /* desktop: sidebar cố định, đẩy nội dung sang phải */
  @media(min-width:1024px){
    #sidebar{transform:none} #backdrop{display:none!important}
    #shell{margin-left:var(--sidebar-w)}
    #hamburger{display:none}
  }

  #topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}

  /* Scanner fullscreen */
  #scanWrap{position:fixed;inset:0;background:#000;z-index:70;display:none;flex-direction:column}
  #reader{flex:1;width:100%}
  #scanFrame{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
  #scanFrame .box{width:64vw;max-width:300px;aspect-ratio:1;border:3px solid #fff;border-radius:22px;box-shadow:0 0 0 100vmax rgba(0,0,0,.45)}

  /* Overlay cảnh báo */
  #alertOverlay{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;color:#fff}
  .a-bad{background:rgba(200,16,46,.97)} .a-good{background:rgba(21,163,74,.97)} .a-warn{background:rgba(245,158,11,.97)}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.6}}
  .flashing{animation:flash .45s linear 3}
  @keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .18s ease both}

  /* ===== IN TEM (DỄ CHỈNH KÍCH THƯỚC) ===== */
  @media print{ body *{visibility:hidden} #printArea,#printArea *{visibility:visible} #printArea{position:absolute;left:0;top:0} .label{page-break-after:always} }
  .label{display:flex;gap:3mm;align-items:center;color:#000}
  .label.s5030{width:50mm;height:30mm;padding:2mm}
  .label.s8050{width:80mm;height:50mm;padding:3mm}
  .label .qrbox canvas,.label .qrbox img{width:100%;height:100%}
  .label.s5030 .qrbox{width:26mm;height:26mm} .label.s8050 .qrbox{width:44mm;height:44mm}
  .label .meta{font-size:8pt;line-height:1.25} .label.s8050 .meta{font-size:10pt}
  .hide{display:none!important}
</style>
</head>
<body>

<!-- ====== LOGO TEMPLATE (vector; tự thay bằng logo.png nếu có) ====== -->
<template id="logoTpl">
  <span class="logo-lockup">
    <svg width="34" height="34" viewBox="0 0 64 64" aria-hidden="true">
      <polygon points="32,4 60,32 32,32" fill="#0E2148"/>
      <polygon points="32,4 32,32 6,32" fill="#1B356B"/>
      <polygon points="6,32 32,32 32,60" fill="#C8102E"/>
      <polygon points="32,32 60,32 32,60" fill="#D7DCE5"/>
      <path d="M6 22 C20 8, 44 8, 58 20" stroke="#C8102E" stroke-width="3.4" fill="none" stroke-linecap="round"/>
      <path d="M40 11 l2.4 4.6 5 .6 -3.7 3.4 1 5 -4.7-2.5 -4.6 2.5 .9-5 -3.6-3.4 5-.6z" fill="#C8102E"/>
    </svg>
    <span class="logo-word" style="font-size:18px"><span class="a">AMERICAN</span><span class="s">STAR</span></span>
  </span>
</template>

<!-- ============ 0. CẤU HÌNH ============ -->
<div id="screenConfig" class="hide" style="max-width:460px;margin:0 auto;padding:40px 24px">
  <div class="text-center mb-6"><div id="cfgLogo" class="flex justify-center mb-3"></div>
    <div class="text-slate-500">Cấu hình kết nối máy chủ</div></div>
  <div class="card p-6">
    <label class="font-semibold">URL Web App (Apps Script)</label>
    <p class="text-sm text-slate-500 mb-2">Dán URL kết thúc bằng <b>/exec</b>.</p>
    <input id="cfgUrl" class="field mb-3" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="btn btn-navy w-full" onclick="saveConfig()">Lưu &amp; Kiểm tra kết nối</button>
    <div id="cfgMsg" class="text-center mt-3 text-sm"></div>
  </div>
</div>

<!-- ============ 1. LOGIN ============ -->
<div id="screenLogin" class="hide" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
     background:radial-gradient(1200px 500px at 50% -10%, #1B356B22, transparent), var(--bg)">
  <div style="width:100%;max-width:420px">
    <div class="text-center mb-5"><div id="loginLogo" class="flex justify-center mb-2" style="transform:scale(1.25)"></div>
      <div class="text-slate-500 mt-3">Hệ thống Quản lý Xuất Nhập Tồn kho</div></div>
    <div class="card p-6">
      <div class="font-semibold mb-2 text-slate-700">Vai trò</div>
      <div class="grid grid-cols-2 gap-2.5 mb-5" id="roleGrid"></div>
      <input id="loginUser" class="field mb-3" placeholder="Tên đăng nhập" autocomplete="username">
      <input id="loginPin" class="field text-center tracking-[.5em] text-2xl mb-3" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="current-password">
      <div id="pinPad" class="grid grid-cols-3 gap-2 mb-4"></div>
      <button class="btn btn-navy w-full" onclick="doLogin()">ĐĂNG NHẬP — VÀO CA</button>
      <div id="loginMsg" class="text-center mt-3 text-sm" style="color:var(--red)"></div>
      <div class="text-center mt-4 text-xs text-slate-400 cursor-pointer" onclick="show('screenConfig')">⚙ Đổi URL máy chủ</div>
    </div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="hide">
  <div id="backdrop" onclick="toggleSidebar(false)"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="on-dark">
    <div class="sbrand"><div id="sideLogo"></div></div>
    <nav id="sbNav" class="flex-1 overflow-auto py-2"></nav>
    <div class="p-3 border-t" style="border-color:rgba(255,255,255,.08)">
      <div class="flex items-center gap-3 px-2 mb-2">
        <div id="avatar" class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-white" style="background:var(--red)"></div>
        <div class="leading-tight"><div id="sbUser" class="text-white font-semibold text-sm"></div><div id="sbRole" class="text-xs" style="color:#7c8db5"></div></div>
      </div>
      <button onclick="logout()" class="w-full text-left px-3 py-2 rounded-xl text-sm font-semibold" style="color:#fca5a5;background:rgba(255,255,255,.05)">⎋ Đăng xuất</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="shell">
    <header id="topbar" class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-3">
        <button id="hamburger" onclick="toggleSidebar(true)" class="text-2xl leading-none" style="color:var(--navy)">☰</button>
        <div>
          <div id="pageTitle" class="font-extrabold text-lg leading-tight" style="color:var(--navy)">Trang chủ</div>
          <div id="pageSub" class="text-xs text-slate-400 leading-tight"></div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="netDot" title="trạng thái mạng" class="text-lg">●</span>
        <div id="headLogo" class="hidden sm:block"></div>
      </div>
    </header>
    <main id="main" class="px-4 py-5 max-w-6xl mx-auto pb-24"></main>
  </div>
</div>

<!-- ============ SCANNER ============ -->
<div id="scanWrap">
  <div class="flex items-center justify-between p-3 text-white relative z-10">
    <div id="scanTitle" class="font-bold">Quét QR</div>
    <button class="bg-white/20 px-4 py-2 rounded-xl text-white font-bold" onclick="stopScan()">✕ Đóng</button>
  </div>
  <div id="reader"></div>
  <div id="scanFrame"><div class="box"></div></div>
  <div id="scanHint" class="p-4 text-center text-white/80 text-sm relative z-10">Đưa mã QR vào khung</div>
</div>

<!-- ============ OVERLAY CẢNH BÁO ============ -->
<div id="alertOverlay">
  <div id="alertIcon" class="pop" style="font-size:76px">⚠️</div>
  <div id="alertTitle" class="text-3xl font-extrabold mt-2"></div>
  <div id="alertMsg" class="text-xl mt-3 max-w-md whitespace-pre-line"></div>
  <button class="btn bg-white text-black mt-8 px-10" onclick="closeAlert()">ĐÃ HIỂU — TIẾP TỤC</button>
</div>

<div id="printArea"></div>

<script>
/*************************************************************************
 * AMERICAN STAR WMS — FRONTEND (JS thuần). Không hardcode URL/secret.
 *************************************************************************/
var CONFIG = {
  // ===== URL MÁY CHỦ MẶC ĐỊNH (nhúng sẵn) — ĐỔI Ở ĐÂY nếu deploy lại tạo URL mới =====
  defaultEndpoint:'https://script.google.com/macros/s/AKfycbyirBcIywvjqb0RjwIgD1w7UFHayS2Zac97DYGe8NCd-N9cGfOxIbCoerEUP8z9PPzBNw/exec',
  endpointKey:'as_wms_endpoint', sessionKey:'as_wms_session', queueKey:'as_wms_offline_queue', cacheKey:'as_wms_cache', dbl:3000
};
var ROLES = {
  packer:  {label:'Đóng gói',  icon:'📦', home:'inbound',   nav:['inbound']},
  picker:  {label:'Thủ kho',   icon:'🚚', home:'outbound',  nav:['outbound','inventory']},
  manager: {label:'Quản lý',   icon:'📊', home:'dashboard', nav:['dashboard','inventory','report','admin']},
  admin:   {label:'Admin',     icon:'⚙️', home:'dashboard', nav:['dashboard','inbound','outbound','inventory','report','admin']}
};
// nhóm menu sidebar + tiêu đề trang
var NAV = {
  inbound:{label:'Đóng gói',icon:'📦',group:'VẬN HÀNH',sub:'Quét nhập kho & in tem QR'},
  outbound:{label:'Xuất hàng',icon:'🚚',group:'VẬN HÀNH',sub:'Loading & quét xuất theo SO'},
  inventory:{label:'Tồn kho',icon:'📋',group:'KHO',sub:'Tồn theo SKU'},
  dashboard:{label:'Tổng quan',icon:'📊',group:'BÁO CÁO',sub:'KPI & xu hướng'},
  report:{label:'Báo cáo ngày',icon:'📈',group:'BÁO CÁO',sub:'Đóng gói & xuất hàng'},
  admin:{label:'Quản trị',icon:'⚙️',group:'HỆ THỐNG',sub:'SKU · User · Xe · Import'}
};
var session=null, cache={skus:[],inventory:[],vehicles:[],settings:{},server_date:''}, currentView=null, lastScan={value:'',t:0};
// Ngày theo MÚI GIỜ MÁY CHỦ (để báo cáo/loadings khớp với timestamp đã lưu)
function serverToday(){ return cache.server_date || new Date().toISOString().slice(0,10); }
function round3(n){ return Math.round((+n||0)*1000)/1000; }

/* logo: dùng logo.png nếu tải được, ngược lại dùng vector */
function logoHTML(){ return document.getElementById('logoTpl').innerHTML; }
function mountLogos(){
  ['cfgLogo','loginLogo','sideLogo','headLogo'].forEach(function(id){ var el=document.getElementById(id); if(el) el.innerHTML=logoHTML(); });
  // thử nạp logo.png, nếu có thì thay vào
  var img=new Image();
  img.onload=function(){ ['cfgLogo','loginLogo','sideLogo','headLogo'].forEach(function(id){ var el=document.getElementById(id); if(el) el.innerHTML='<img src="./logo.png" style="height:'+(id==='headLogo'?28:46)+'px">'; }); };
  img.src='./logo.png';
}

/* ---------- API ---------- */
function endpoint(){ return localStorage.getItem(CONFIG.endpointKey) || CONFIG.defaultEndpoint || ''; }
async function api(action, payload){
  var url=endpoint(); if(!url) throw new Error('Chưa cấu hình URL máy chủ');
  var res=await fetch(url,{method:'POST',body:JSON.stringify({action:action,token:session?session.token:'',payload:payload||{}}),redirect:'follow'});
  var data=await res.json(); if(!data.ok) throw new Error(data.error||'Lỗi máy chủ'); return data;
}

/* ---------- KHỞI ĐỘNG ---------- */
window.addEventListener('load', function(){
  mountLogos(); buildRoleGrid(); buildPinPad();
  window.addEventListener('online',updateNet); window.addEventListener('offline',updateNet);
  if(!endpoint()){ show('screenConfig'); return; }
  var s=localStorage.getItem(CONFIG.sessionKey);
  if(s){ session=JSON.parse(s); enterApp(); } else show('screenLogin');
});
function show(id){ ['screenConfig','screenLogin','app'].forEach(function(x){ document.getElementById(x).classList.add('hide'); }); document.getElementById(id).classList.remove('hide'); }

/* ---------- CẤU HÌNH ---------- */
function saveConfig(){
  var url=document.getElementById('cfgUrl').value.trim(), msg=document.getElementById('cfgMsg');
  if(!/^https:\/\/script\.google\.com\/.+\/exec$/.test(url)){ msg.style.color='var(--red)'; msg.textContent='URL phải dạng https://script.google.com/.../exec'; return; }
  localStorage.setItem(CONFIG.endpointKey,url); msg.style.color='var(--navy)'; msg.textContent='Đang kiểm tra...';
  api('ping').then(function(){ msg.style.color='var(--green)'; msg.textContent='Kết nối OK ✓'; setTimeout(function(){show('screenLogin');},700); })
             .catch(function(e){ msg.style.color='var(--red)'; msg.textContent='Lỗi: '+e.message; });
}

/* ---------- LOGIN ---------- */
var selectedRole='packer';
function buildRoleGrid(){
  var g=document.getElementById('roleGrid'); g.innerHTML='';
  Object.keys(ROLES).forEach(function(r){
    var b=document.createElement('button'); b.className='btn btn-ghost'; b.style.minHeight='70px'; b.style.flexDirection='column'; b.style.gap='4px';
    b.innerHTML='<div style="font-size:24px">'+ROLES[r].icon+'</div><div style="font-size:14px">'+ROLES[r].label+'</div>';
    b.onclick=function(){ selectedRole=r; [].forEach.call(g.children,function(c){c.className='btn btn-ghost';c.style.minHeight='70px';c.style.flexDirection='column';c.style.gap='4px';}); b.className='btn btn-navy'; b.style.minHeight='70px'; b.style.flexDirection='column'; b.style.gap='4px'; };
    g.appendChild(b);
  });
  g.children[0].click();
}
function buildPinPad(){
  var pad=document.getElementById('pinPad'); pad.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','C','0','⌫'].forEach(function(k){
    var b=document.createElement('button'); b.className='btn btn-ghost'; b.textContent=k;
    b.onclick=function(){ var i=document.getElementById('loginPin'); if(k==='C')i.value=''; else if(k==='⌫')i.value=i.value.slice(0,-1); else if(i.value.length<6)i.value+=k; };
    pad.appendChild(b);
  });
}
function doLogin(){
  var msg=document.getElementById('loginMsg'); msg.textContent='';
  var username=document.getElementById('loginUser').value.trim(), pin=document.getElementById('loginPin').value.trim();
  if(!username||!pin){ msg.textContent='Nhập tài khoản và PIN'; return; }
  api('login',{username:username,pin:pin,role:selectedRole}).then(function(d){
    session={username:d.username,role:d.role,token:d.token}; localStorage.setItem(CONFIG.sessionKey,JSON.stringify(session)); enterApp();
  }).catch(function(e){ msg.textContent=e.message; beep(false); });
}
function logout(){ localStorage.removeItem(CONFIG.sessionKey); session=null; document.getElementById('loginPin').value=''; show('screenLogin'); }

/* ---------- VÀO APP ---------- */
async function enterApp(){
  show('app'); updateNet();
  document.getElementById('sbUser').textContent=session.username;
  document.getElementById('sbRole').textContent=ROLES[session.role].label;
  document.getElementById('avatar').textContent=(session.username[0]||'?').toUpperCase();
  buildSidebar();
  try{ var b=await api('getBootstrap'); cache.skus=b.skus||[]; cache.inventory=b.inventory||[]; cache.vehicles=b.vehicles||[]; cache.server_date=b.server_date||'';
       cache.settings={}; (b.settings||[]).forEach(function(s){cache.settings[s.key]=s.value;}); localStorage.setItem(CONFIG.cacheKey,JSON.stringify(cache)); }
  catch(e){ var c=localStorage.getItem(CONFIG.cacheKey); if(c) cache=JSON.parse(c); }
  flushQueue();
  // nạp trước danh sách SO cần xuất để "Tạo loading" mở tức thì
  if(['picker','admin','manager'].indexOf(session.role)>=0){ api('getOpenSOs').then(function(r){ _sosMemo=r.items; }).catch(function(){}); }
  go(ROLES[session.role].home);
}
function buildSidebar(){
  var nav=document.getElementById('sbNav'); nav.innerHTML=''; var items=ROLES[session.role].nav; var lastGroup='';
  items.forEach(function(v){
    if(NAV[v].group!==lastGroup){ lastGroup=NAV[v].group; var g=document.createElement('div'); g.className='sbgroup'; g.textContent=lastGroup; nav.appendChild(g); }
    var d=document.createElement('div'); d.className='sbitem'; d.id='side_'+v;
    d.innerHTML='<span class="ic">'+NAV[v].icon+'</span>'+NAV[v].label;
    d.onclick=function(){ go(v); toggleSidebar(false); }; nav.appendChild(d);
  });
}
function toggleSidebar(open){ var sb=document.getElementById('sidebar'),bd=document.getElementById('backdrop');
  if(open){ sb.classList.add('open'); bd.classList.add('show'); } else { sb.classList.remove('open'); bd.classList.remove('show'); } }
function go(view){
  currentView=view;
  [].forEach.call(document.querySelectorAll('.sbitem'),function(b){b.classList.remove('active');});
  var sb=document.getElementById('side_'+view); if(sb) sb.classList.add('active');
  document.getElementById('pageTitle').textContent=NAV[view].label;
  document.getElementById('pageSub').textContent=NAV[view].sub;
  var m=document.getElementById('main'); m.innerHTML='<div class="text-center text-slate-400 py-12">Đang tải…</div>';
  ({inbound:viewInbound,outbound:viewOutbound,inventory:viewInventory,dashboard:viewDashboard,report:viewReport,admin:viewAdmin}[view]||viewInbound)(m);
}

/* ====================================================================

function todayCountKey(){ return 'as_packcount_'+session.username+'_'+serverToday(); }
function viewInbound(m){
  var cnt=parseInt(localStorage.getItem(todayCountKey())||'0',10);
  m.innerHTML=

    '<div><div class="opacity-80 text-sm">Hôm nay bạn đã đóng gói</div><div class="num" style="color:#fff;font-size:42px">'+cnt+' <span class="text-lg opacity-80">cái</span></div></div>'+
    '<div style="font-size:46px">📦</div></div>'+
  '<button class="btn btn-navy btn-lg mb-3" onclick="startInboundScan()">📷 QUÉT QR NHẬP KHO</button>'+

  '<div class="card p-4"><div class="font-semibold mb-2 text-slate-700">Lượt nhập gần đây (máy này)</div><div id="recentIn" class="text-sm text-slate-600 space-y-1"></div></div>';

}
function renderRecentIn(){
  var r=JSON.parse(localStorage.getItem('as_recent_in')||'[]').slice(0,8);
  document.getElementById('recentIn').innerHTML=r.length? r.map(function(x){return '<div>✓ <span class="text-slate-400">'+x.t+'</span> — '+x.sku+'</div>';}).join('') : '<span class="text-slate-400">Chưa có</span>';
}
function startInboundScan(){ openScanner('Quét QR — Nhập kho', handleInbound); }
/* QUÉT NHẬP TỨC THÌ: kiểm tra SKU bằng danh mục đã cache (ngay lập tức),
   phản hồi xanh/đỏ liền, rồi GỬI máy chủ ở chế độ nền (không bắt người dùng chờ). */
function handleInbound(code){
  var sku=code.trim();
  var sk=cache.skus.filter(function(s){return String(s.sku_code)===sku;})[0];
  if(sk){
    if(String(sk.active)==='false'){ flashAlert('bad','SKU BỊ VÔ HIỆU','SKU đã bị vô hiệu hóa'); return; }
    bumpInbound(sku);                                   // tăng bộ đếm ngay
    flashAlert('good','✓ ĐÃ NHẬP KHO',(sk.product_name||sku), true);
    sendInbound(sku);                                   // ghi máy chủ ở nền
    return;
  }
  // SKU lạ (chưa có trong cache, ví dụ vừa thêm) -> hỏi máy chủ
  if(!navigator.onLine){ flashAlert('bad','MÃ QR KHÔNG HỢP LỆ', sku+'\nKhông có trong danh mục (offline)'); return; }
  api('inboundScan',{sku_code:sku}).then(function(d){
    if(d.valid){ bumpInbound(sku); flashAlert('good','✓ ĐÃ NHẬP KHO',(d.sku.product_name||sku)+'\nTồn: '+d.qty_in_stock, true); }
    else flashAlert('bad', nameOf(d.code), d.message);
  }).catch(function(e){ flashAlert('bad','LỖI', e.message); });
}
function sendInbound(sku){
  if(!navigator.onLine){ queuePush({action:'inboundScan',payload:{sku_code:sku}}); return; }
  api('inboundScan',{sku_code:sku}).catch(function(){ queuePush({action:'inboundScan',payload:{sku_code:sku}}); }); // lỗi -> đưa vào hàng đợi
}
function bumpInbound(sku){
  var k=todayCountKey(); localStorage.setItem(k,(parseInt(localStorage.getItem(k)||'0',10)+1));
  var r=JSON.parse(localStorage.getItem('as_recent_in')||'[]'); r.unshift({t:new Date().toTimeString().slice(0,8),sku:sku}); localStorage.setItem('as_recent_in',JSON.stringify(r.slice(0,20)));
  if(currentView==='inbound') viewInbound(document.getElementById('main'));
}
/* ---- Mẫu tem (designer): chọn trường hiển thị, lưu vào localStorage ---- */
var LBL_DEFAULT={showCompany:false,showName:true,showSizeThick:true,showSku:true,showDate:true,custom:''};
function labelTpl(){ try{ return Object.assign({},LBL_DEFAULT,JSON.parse(localStorage.getItem('as_label_tpl')||'{}')); }catch(e){ return Object.assign({},LBL_DEFAULT); } }
function saveLabelTpl(){
  localStorage.setItem('as_label_tpl', JSON.stringify({
    showCompany:document.getElementById('lt_co').checked, showName:document.getElementById('lt_name').checked,
    showSizeThick:document.getElementById('lt_size').checked, showSku:document.getElementById('lt_sku').checked,
    showDate:document.getElementById('lt_date').checked, custom:document.getElementById('lt_custom').value }));
  previewQR();
}
function labelMetaHTML(s,sku,date){
  var t=labelTpl(), L=[];
  if(t.showCompany) L.push('<b style="color:#0E2148">'+(cache.settings.company_name||'AMERICAN STAR')+'</b>');
  if(t.showName) L.push('<b>'+(s.product_name||sku)+'</b>');
  if(t.showSizeThick){ var sz=((s.size||'')+(s.thickness?(' · '+s.thickness):'')).trim(); if(sz)L.push(sz); }
  if(t.showSku) L.push(sku);
  if(t.showDate) L.push('ĐG: '+date);
  if(t.custom) L.push(t.custom);
  return L.join('<br>');
}
function openCreateLabel(){
  var m=document.getElementById('main'); var size=cache.settings.label_size||'50x30'; var t=labelTpl();
  function ck(id,lbl,on){ return '<label class="flex items-center gap-2 text-sm py-1"><input type="checkbox" id="'+id+'" '+(on?'checked':'')+' onchange="saveLabelTpl()" style="width:18px;height:18px;accent-color:var(--navy)">'+lbl+'</label>'; }
  m.innerHTML=
  '<button class="btn btn-ghost mb-4" onclick="go(\'inbound\')">← Quay lại</button>'+
  '<div class="card p-5 mb-3"><div class="sectiontitle mb-3">In tem QR</div>'+
    '<input id="skuSearch" class="field mb-2" placeholder="🔍 Tìm SKU..." oninput="filterSkuOptions()">'+
    '<select id="skuSelect" class="field mb-3" size="6" style="height:auto"></select>'+
    '<div class="grid grid-cols-2 gap-3">'+
      '<div><label class="text-sm text-slate-500">Số lượng tem</label><input id="lblQty" type="number" value="1" min="1" class="field"></div>'+
      '<div><label class="text-sm text-slate-500">Khổ tem</label><select id="lblSize" class="field" onchange="previewQR()"><option value="50x30"'+(size==='50x30'?' selected':'')+'>50×30 mm</option><option value="80x50"'+(size==='80x50'?' selected':'')+'>80×50 mm</option></select></div></div></div>'+
  '<div class="card p-5 mb-3"><div class="font-semibold mb-3 text-slate-700">🎨 Thiết kế mẫu tem</div>'+
    '<div class="grid grid-cols-2 gap-1 mb-3">'+ck('lt_co','Tên công ty',t.showCompany)+ck('lt_name','Tên sản phẩm',t.showName)+ck('lt_size','Size / độ dày',t.showSizeThick)+ck('lt_sku','Mã SKU',t.showSku)+ck('lt_date','Ngày đóng gói',t.showDate)+'</div>'+
    '<label class="text-sm text-slate-500">Dòng chữ thêm (tùy chọn)</label>'+
    '<input id="lt_custom" class="field" value="'+(t.custom||'').replace(/"/g,'&quot;')+'" oninput="saveLabelTpl()" placeholder="VD: Made in USA / Hotline 1900..."></div>'+
  '<div class="card p-5"><div class="font-semibold mb-3 text-slate-700">Xem trước tem (đúng như khi in)</div>'+
    '<div id="qrPreview" class="flex justify-center my-2 p-4 rounded-2xl" style="background:#F1F5F9"></div>'+
    '<button class="btn btn-navy w-full mt-3" onclick="printLabels()">🖨️ IN TEM</button></div>';
  filterSkuOptions(); document.getElementById('skuSelect').onchange=previewQR;
}
function filterSkuOptions(){
  var q=(document.getElementById('skuSearch').value||'').toLowerCase(), sel=document.getElementById('skuSelect'); sel.innerHTML='';
  cache.skus.filter(function(s){return String(s.active)!=='false'&&(s.sku_code+' '+s.product_name).toLowerCase().indexOf(q)>=0;}).slice(0,100)
    .forEach(function(s){ var o=document.createElement('option'); o.value=s.sku_code; o.textContent=s.sku_code; sel.appendChild(o); });
  if(sel.options.length){ sel.selectedIndex=0; previewQR(); } else document.getElementById('qrPreview').innerHTML='<span class="text-slate-400 text-sm">Không có SKU</span>';
}
function previewQR(){
  var box=document.getElementById('qrPreview'); if(!box) return; box.innerHTML='';
  var v=document.getElementById('skuSelect').value; if(!v){ box.innerHTML='<span class="text-slate-400 text-sm">Chọn SKU để xem trước</span>'; return; }
  var size=(document.getElementById('lblSize')||{}).value||'50x30';
  var s=cache.skus.filter(function(x){return x.sku_code===v;})[0]||{product_name:v};
  var wrap=document.createElement('div'); wrap.className='label s'+size.replace('x',''); wrap.style.background='#fff'; wrap.style.boxShadow='0 3px 10px rgba(0,0,0,.18)';
  var qb=document.createElement('div'); qb.className='qrbox'; wrap.appendChild(qb);
  new QRCode(qb,{text:(cache.settings.qr_prefix||'')+v,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
  var meta=document.createElement('div'); meta.className='meta'; meta.innerHTML=labelMetaHTML(s,v,serverToday()); wrap.appendChild(meta);
  box.appendChild(wrap);
}
function printLabels(){
  var sku=document.getElementById('skuSelect').value; if(!sku){alert('Chọn SKU');return;}
  var qty=Math.max(1,parseInt(document.getElementById('lblQty').value||'1',10)), size=document.getElementById('lblSize').value;
  var s=cache.skus.filter(function(x){return x.sku_code===sku;})[0]||{product_name:sku};
  var area=document.getElementById('printArea'); area.innerHTML=''; var date=serverToday();
  for(var i=0;i<qty;i++){ var wrap=document.createElement('div'); wrap.className='label s'+size.replace('x','');
    var qb=document.createElement('div'); qb.className='qrbox'; wrap.appendChild(qb);
    new QRCode(qb,{text:(cache.settings.qr_prefix||'')+sku,width:300,height:300,correctLevel:QRCode.CorrectLevel.M});
    var meta=document.createElement('div'); meta.className='meta'; meta.innerHTML=labelMetaHTML(s,sku,date);
    wrap.appendChild(meta); area.appendChild(wrap); }
  window.print();
}

/* ====================================================================
 * 3. XUẤT HÀNG / LOADING
 * ==================================================================== */
var activeLoading=null, _ldMemo=null;
function viewOutbound(m){
  m.innerHTML=
  '<div class="flex items-center justify-between mb-4"><div class="sectiontitle">Loading hôm nay</div>'+
    '<button class="btn btn-navy" onclick="openCreateLoading()">+ Tạo Loading</button></div>'+
  '<div id="loadingList" class="space-y-2.5"></div>';
  if(_ldMemo) paintLoadings(_ldMemo);   // hiện ngay danh sách lần trước -> không chờ
  else document.getElementById('loadingList').innerHTML='<div class="text-center text-slate-400 py-8">Đang tải…</div>';
  // date rỗng -> máy chủ tự lọc theo ngày của nó (tránh lệch giờ trình duyệt)
  api('getLoadings',{date:''}).then(function(r){ _ldMemo=r.items; if(currentView==='outbound') paintLoadings(r.items); })
    .catch(function(){ if(!_ldMemo && currentView==='outbound') document.getElementById('loadingList').innerHTML='<div class="card p-6 text-center text-slate-400">Không tải được — kiểm tra mạng.</div>'; });
}
function paintLoadings(lds){
  var list=document.getElementById('loadingList'); if(!list) return; list.innerHTML='';
  if(!lds.length){ list.innerHTML='<div class="card p-8 text-center text-slate-400">Chưa có loading nào. Bấm “+ Tạo Loading”.</div>'; return; }
  lds.forEach(function(l){
    var pct=l.fill_percent||0, bc=pct>100?'var(--red)':(pct>90?'var(--amber)':'var(--green)');
    var st=l.status==='done'?'<span class="pill" style="background:#dcfce7;color:#166534">Hoàn tất</span>':'<span class="pill" style="background:#dbeafe;color:#1e40af">Đang xếp</span>';
    var d=document.createElement('div'); d.className='card p-4 cursor-pointer'; d.onclick=function(){openLoading(l.loading_id);};
    d.innerHTML='<div class="flex items-center justify-between"><div class="font-bold">'+l.loading_id+'</div>'+st+'</div>'+
      '<div class="text-sm text-slate-500 mt-1">SO: '+(l.so_list||'-')+'</div>'+
      '<div class="text-sm text-slate-500">Xe: '+(l.vehicle_id||'-')+' · '+(l.total_volume_m3||0)+'/'+(l.capacity_m3||0)+' m³</div>'+
      '<div style="background:#eef2f7;border-radius:999px;height:8px;margin-top:8px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+bc+'"></div></div>';
    list.appendChild(d);
  });
}
var _sosMemo=null, _editPre=null;
function openCreateLoading(pre){
  pre=pre||null; _editPre=pre; var m=document.getElementById('main');
  var preVeh=pre?pre.vehicle_id:'';
  var vehOpts=cache.vehicles.filter(function(v){return String(v.active)!=='false';}).map(function(v){return '<option value="'+v.vehicle_id+'"'+(String(preVeh)===String(v.vehicle_id)?' selected':'')+'>'+v.vehicle_name+' ('+v.capacity_m3+' m³)</option>';}).join('');
  m.innerHTML=
  '<button class="btn btn-ghost mb-4" onclick="'+(pre?'openLoading(\''+pre.loading_id+'\')':'go(\'outbound\')')+'">← Quay lại</button>'+
  '<div class="sectiontitle mb-3">'+(pre?'Sửa '+pre.loading_id:'Tạo Loading mới')+'</div>'+
  '<div class="card p-5 mb-3"><div class="font-semibold mb-2 text-slate-700">1 · Chọn xe</div>'+
    '<select id="ldVehicle" class="field" onchange="recalcEst()">'+(vehOpts||'<option value="">— chưa có xe, thêm ở Quản trị —</option>')+'</select>'+
    '<div id="estVol" class="text-sm text-slate-500 mt-2"></div></div>'+
  '<div class="card p-5"><div class="font-semibold mb-2 text-slate-700">2 · Chọn SO để xếp (<span id="soCount">…</span> đơn)</div>'+
    '<input class="field mb-2" placeholder="🔍 Lọc SO / khách..." oninput="filterSO(this.value)">'+
    '<div id="soPick" style="max-height:42vh;overflow:auto;margin:0 -6px"></div></div>'+
  '<button class="btn btn-green w-full mt-3" onclick="'+(pre?'updateLoadingSave(\''+pre.loading_id+'\')':'submitLoading()')+'">💾 '+(pre?'LƯU THAY ĐỔI':'LƯU LOADING')+'</button>';
  // hiện NGAY danh sách SO từ cache (nếu có) -> không chờ
  if(_sosMemo) applyOpenSOs(_sosMemo, pre); else document.getElementById('soPick').innerHTML='<div class="text-center text-slate-400 py-6">Đang tải đơn…</div>';
  // làm mới ở nền
  api('getOpenSOs').then(function(r){ _sosMemo=r.items; if(currentView==='outbound') applyOpenSOs(r.items, _editPre); })
    .catch(function(){ if(!_sosMemo){ var el=document.getElementById('soPick'); if(el) el.innerHTML='<div class="text-center text-slate-400 py-6">Không tải được đơn — kiểm tra mạng</div>'; } });
  recalcEst();
}
function applyOpenSOs(list, pre){
  var sos=(list||[]).slice();
  if(pre && pre.so_list){ pre.so_list.forEach(function(sn){ if(!sos.some(function(s){return String(s.so_number)===String(sn);})) sos.push({so_number:sn,customer:'(đang trong loading)',delivery_date:'',qty_ordered:0,lines:0}); }); }
  window._openSOs=sos;
  var c=document.getElementById('soCount'); if(c) c.textContent=sos.length;
  renderSOpick(sos);
  if(pre && pre.so_list){ [].forEach.call(document.querySelectorAll('.soChk'),function(cb){ if(pre.so_list.indexOf(cb.value)>=0) cb.checked=true; }); }
  recalcEst();
}
async function updateLoadingSave(id){
  var sel=selectedSOs(); if(!sel.length){ alert('Chọn ít nhất 1 SO'); return; }
  try{ await api('updateLoading',{loading_id:id, vehicle_id:document.getElementById('ldVehicle').value, so_list:sel}); _ldMemo=null; openLoading(id); }catch(e){ alert(e.message); }
}
function editLoading(){ var ld=window._curLoading; if(!ld)return; openCreateLoading({loading_id:ld.loading_id, vehicle_id:ld.vehicle_id, so_list:String(ld.so_list).split(',').filter(String)}); }
async function deleteLoadingNow(){ var ld=window._curLoading; if(!ld)return; if(!confirm('Xóa loading '+ld.loading_id+'?\nTồn kho sẽ được hoàn lại cho các lượt đã quét trong loading này.'))return;
  try{ await api('deleteLoading',{loading_id:ld.loading_id}); _ldMemo=null; flashAlert('good','✓ ĐÃ XÓA',ld.loading_id, true); setTimeout(function(){go('outbound');},900); }catch(e){ alert(e.message); } }
function renderSOpick(list){
  var c=document.getElementById('soPick'); c.innerHTML='';
  if(!list.length){ c.innerHTML='<div class="text-slate-400 text-center py-6">Không có SO cần xuất</div>'; return; }
  list.forEach(function(s){
    var row=document.createElement('label'); row.className='flex items-center gap-3 px-3 py-3 rounded-xl cursor-pointer'; row.style.borderBottom='1px solid var(--line)';
    row.innerHTML='<input type="checkbox" class="soChk" value="'+s.so_number+'" onchange="recalcEst()" style="width:22px;height:22px;accent-color:var(--navy)">'+
      '<div class="flex-1"><div class="font-semibold">'+s.so_number+' · '+s.customer+'</div>'+
      '<div class="text-sm text-slate-500">Giao '+(s.delivery_date||'-')+' · '+s.qty_ordered+' cái · '+s.lines+' dòng</div></div>';
    c.appendChild(row);
  });
}
function filterSO(q){ q=(q||'').toLowerCase(); renderSOpick((window._openSOs||[]).filter(function(s){return (s.so_number+' '+s.customer).toLowerCase().indexOf(q)>=0;})); }
function selectedSOs(){ return [].map.call(document.querySelectorAll('.soChk:checked'),function(c){return c.value;}); }
function recalcEst(){
  var sel=selectedSOs(), sos=window._openSOs||[];
  var qty=sos.filter(function(s){return sel.indexOf(s.so_number)>=0;}).reduce(function(a,s){return a+s.qty_ordered;},0);
  var veh=cache.vehicles.filter(function(v){return v.vehicle_id===document.getElementById('ldVehicle').value;})[0];
  var cap=veh?parseFloat(veh.capacity_m3)||0:0;
  document.getElementById('estVol').textContent='Đã chọn '+sel.length+' SO · '+qty+' cái'+(cap?(' · sức chứa xe '+cap+' m³'):'');
}
async function submitLoading(){
  var sel=selectedSOs(); if(!sel.length){alert('Chọn ít nhất 1 SO');return;}
  try{ await api('createLoading',{vehicle_id:document.getElementById('ldVehicle').value,so_list:sel}); _ldMemo=null;
    // Lưu sẵn rồi quay về danh sách — khi ra xuất hàng mở loading này lên để quét
    flashAlert('good','✓ ĐÃ LƯU LOADING','Mở lại từ danh sách để quét khi xuất hàng', true);
    setTimeout(function(){ go('outbound'); }, 950);
  }catch(e){ alert(e.message); }
}
async function openLoading(id){
  activeLoading=id; var m=document.getElementById('main'); m.innerHTML='<div class="text-center text-slate-400 py-12">Đang tải loading…</div>';
  var d; try{ d=await api('getLoading',{loading_id:id}); }catch(e){ m.innerHTML='<div class="card p-4">'+e.message+'</div>'; return; }
  window._curD=d; rebuildStock(); renderLoading(d);
  // làm mới tồn kho ở nền để kiểm tra cục bộ chính xác hơn
  api('getInventory').then(function(r){ cache.inventory=r.items; rebuildStock(); }).catch(function(){});
}
function rebuildStock(){ window._lmStock={}; (cache.inventory||[]).forEach(function(r){ window._lmStock[r.sku_code]=+r.qty_in_stock||0; }); }
function renderLoading(d){
  var m=document.getElementById('main'), ld=d.loading, pct=d.fill_percent||0, bc=pct>100?'var(--red)':(pct>90?'var(--amber)':'var(--green)');
  window._curLoading=ld;
  var totLineVol=0;
  var rows=d.table.map(function(t){ var done=t.scanned>=t.ordered; var ve=+t.volume_each||0; var lineVol=ve*t.ordered; totLineVol+=lineVol;
    return '<tr><td>'+t.product_name+'<div class="text-xs text-slate-400">'+t.sku_code+'</div></td>'+
      '<td class="text-center"><b style="color:'+(done?'var(--green)':'var(--navy)')+';font-size:16px">'+t.scanned+'/'+t.ordered+'</b></td>'+
      '<td class="text-center text-slate-600">'+(ve?ve.toFixed(3):'-')+'</td>'+
      '<td class="text-center font-semibold" style="color:var(--navy)">'+(lineVol?lineVol.toFixed(3):'-')+'</td>'+
      '<td class="text-center">'+(done?'<span style="color:var(--green)">✓</span>':'')+'</td></tr>'; }).join('');
  var allDone=d.table.length>0 && d.table.every(function(t){return t.scanned>=t.ordered;});
  m.innerHTML=
  '<button class="btn btn-ghost mb-4" onclick="go(\'outbound\')">← Danh sách loading</button>'+
  '<div class="card p-5 mb-3"><div class="flex justify-between items-center"><div class="font-bold text-lg">'+ld.loading_id+'</div><div class="text-sm text-slate-500">Xe: '+(ld.vehicle_id||'-')+'</div></div>'+
    '<div class="mt-3 text-sm text-slate-600">Thể tích đã xếp: <b style="color:var(--navy)">'+d.scanned_volume_m3+' m³</b> / '+d.capacity_m3+' m³ <span class="text-slate-400">(ước tính đơn '+d.estimate_volume_m3+' m³)</span></div>'+
    '<div style="background:#eef2f7;border-radius:999px;height:16px;margin-top:8px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+bc+';transition:.3s"></div></div>'+
    '<div class="text-right text-sm font-bold mt-1" style="color:'+bc+'">'+pct+'%'+(pct>100?' — QUÁ TẢI!':'')+'</div></div>'+
  (ld.status!=='done'?'<div class="flex gap-2 mb-3"><button class="btn btn-ghost flex-1" onclick="editLoading()">✏ Sửa SO/Xe</button><button class="btn btn-red flex-1" onclick="deleteLoadingNow()">🗑 Xóa</button></div>':'')+
  (ld.status==='done'?'<div class="card p-3 mb-3 text-center font-semibold" style="background:#dcfce7;color:#166534">✓ Loading đã hoàn tất</div>':
   '<button class="btn btn-navy btn-lg mb-3" onclick="startOutboundScan()">📷 QUÉT XUẤT HÀNG</button>')+
  '<div class="card overflow-auto mb-3"><table><thead><tr><th>Sản phẩm</th><th class="text-center">Quét/Cần</th><th class="text-center">m³/cái</th><th class="text-center">m³ line</th><th class="text-center">Đủ</th></tr></thead><tbody>'+rows+
    '<tr style="background:#F8FAFC"><td class="font-bold">Tổng thể tích (theo đơn)</td><td></td><td></td><td class="text-center font-bold" style="color:var(--navy)">'+totLineVol.toFixed(3)+'</td><td></td></tr>'+
    '</tbody></table></div>'+

}
function startOutboundScan(){ openScanner('Quét xuất — '+activeLoading, handleOutbound); }
/* QUÉT XUẤT TỨC THÌ: chạy đủ 7 điểm chặn NGAY trên máy bằng dữ liệu loading + tồn kho đã tải,
   phản hồi liền, cập nhật bảng ngay; rồi ghi máy chủ ở nền. Máy chủ từ chối -> tự HOÀN TÁC. */
function handleOutbound(code){
  var sku=code.trim(); var d=window._curD;
  if(!d){ flashAlert('bad','LỖI','Chưa tải được loading'); return; }
  if(!navigator.onLine){ flashAlert('warn','OFFLINE','Khâu xuất cần mạng. Vui lòng kết nối lại.'); return; }
  var sk=cache.skus.filter(function(s){return String(s.sku_code)===sku;})[0];
  if(!sk){ flashAlert('bad', nameOf('INVALID_QR'),'MÃ QR KHÔNG HỢP LỆ — sản phẩm không có trong hệ thống'); return; }      // #4
  var row=d.table.filter(function(t){return String(t.sku_code)===sku;})[0];
  if(!row){ flashAlert('bad', nameOf('WRONG_SKU'),'SAI SKU — không thuộc các đơn trong loading'); return; }                // #1
  if(row.scanned>=row.ordered){ flashAlert('bad', nameOf('ENOUGH'),'ĐÃ ĐỦ SỐ LƯỢNG SKU NÀY ('+row.ordered+')'); return; }   // #2
  var stock=(window._lmStock&&window._lmStock[sku]!=null)?window._lmStock[sku]:0;
  if(stock<=0){ flashAlert('bad', nameOf('NO_STOCK'),'HẾT TỒN — SKU này chưa có hàng đóng gói'); return; }                  // #5/#3
  var cand=(row.perSO||[]).filter(function(p){return p.scanned<p.ordered;}).sort(function(a,b){return String(a.delivery_date||'9999').localeCompare(String(b.delivery_date||'9999'));});
  if(!cand.length){ flashAlert('bad', nameOf('ENOUGH'),'ĐÃ ĐỦ SỐ LƯỢNG'); return; }
  var soNum=cand[0].so_number;
  // ÁP DỤNG NGAY
  row.scanned++; cand[0].scanned++; if(window._lmStock) window._lmStock[sku]=stock-1;
  d.scanned_volume_m3=round3((+d.scanned_volume_m3||0)+(+row.volume_each||0));
  d.fill_percent=d.capacity_m3?Math.round(d.scanned_volume_m3/(+d.capacity_m3)*100):0;
  flashAlert('good','✓ OK',(sk.product_name||sku)+'\nSO '+soNum+' · '+row.scanned+'/'+row.ordered+' · '+d.fill_percent+'% xe', true);
  renderLoading(d);
  // ghi máy chủ ở nền
  api('outboundScan',{loading_id:activeLoading, sku_code:sku, so_number:soNum}).then(function(res){
    if(!res.valid){ rollbackOutbound(sku, soNum); flashAlert('bad', nameOf(res.code)||'TỪ CHỐI', res.message); }
  }).catch(function(){ rollbackOutbound(sku, soNum); flashAlert('bad','MẤT KẾT NỐI','Chưa ghi được lượt quét — đã hoàn tác. Quét lại khi có mạng.'); });
}
function rollbackOutbound(sku, soNum){
  var d=window._curD; if(!d) return;
  var r=d.table.filter(function(t){return String(t.sku_code)===sku;})[0];
  var ve=r?(+r.volume_each||0):0;
  if(r){ r.scanned=Math.max(0,r.scanned-1); var p=(r.perSO||[]).filter(function(x){return String(x.so_number)===String(soNum);})[0]; if(p)p.scanned=Math.max(0,p.scanned-1); }
  if(window._lmStock&&window._lmStock[sku]!=null) window._lmStock[sku]++;
  d.scanned_volume_m3=round3((+d.scanned_volume_m3||0)-ve);
  d.fill_percent=d.capacity_m3?Math.round(d.scanned_volume_m3/(+d.capacity_m3)*100):0;
  if(currentView==='outbound') renderLoading(d);
}
async function completeLoading(){
  if(!confirm('Hoàn tất loading này? Sẽ cập nhật SO và tồn kho.'))return;
  try{ var d=await api('completeLoading',{loading_id:activeLoading}); _ldMemo=null; _sosMemo=null; flashAlert('good','✓ HOÀN TẤT','Đã xếp '+d.total_volume_m3+' m³', true); setTimeout(function(){go('outbound');},1000); }catch(e){ flashAlert('bad','LỖI', e.message); }
}

  var rd=new FileReader(); rd.onload=function(){ api('importSKU',{csvText:rd.result}).then(function(d){ msg.style.color='var(--green)'; msg.textContent='✓ Thêm '+d.added+' · cập nhật '+d.updated+' SKU'; refreshCache(); }).catch(function(e){ msg.style.color='var(--red)'; msg.textContent=e.message; }); };

}

async function saveSettings(){ try{ await api('saveSettings',{values:{reorder_threshold:document.getElementById('set_thr').value,label_size:document.getElementById('set_lbl').value,qr_prefix:document.getElementById('set_pre').value}}); await refreshCache(); var msg=document.getElementById('setMsg'); msg.style.color='var(--green)'; msg.textContent='Đã lưu ✓'; }catch(e){ document.getElementById('setMsg').textContent=e.message; } }
async function refreshCache(){ var b=await api('getBootstrap'); cache.skus=b.skus||[]; cache.inventory=b.inventory||[]; cache.vehicles=b.vehicles||[]; cache.server_date=b.server_date||cache.server_date; cache.settings={}; (b.settings||[]).forEach(function(s){cache.settings[s.key]=s.value;}); localStorage.setItem(CONFIG.cacheKey,JSON.stringify(cache)); }

/* ====================================================================
 * SCANNER
 * ==================================================================== */
var html5qr=null, scanCb=null, seenSinceAccept=true;
function openScanner(title, cb){
  scanCb=cb; seenSinceAccept=true; lastScan={value:'',t:0};
  document.getElementById('scanTitle').textContent=title; document.getElementById('scanWrap').style.display='flex';
  // useBarCodeDetectorIfSupported = dùng bộ giải mã NATIVE của trình duyệt -> nhanh hơn nhiều trên Android/iOS
  html5qr=new Html5Qrcode('reader', { experimentalFeatures:{ useBarCodeDetectorIfSupported:true } });
  html5qr.start({facingMode:'environment'}, {fps:15, qrbox:{width:260,height:260}, aspectRatio:1.0}, onDecode, onScanFail)
    .catch(function(e){ flashAlert('bad','LỖI CAMERA',(e.message||'Không mở được camera')+'\nCần HTTPS và cấp quyền camera.'); stopScan(); });
}
/* CHỐNG NHẬN NHIỀU LẦN: mỗi lần đưa mã vào khung chỉ nhận ĐÚNG 1 lần.
   Phải rút mã ra khỏi khung (onScanFail kích hoạt) thì mới nhận lần kế — kể cả cùng 1 mã QR
   (phù hợp SKU-level: quét nhiều tấm cùng loại, mỗi tấm 1 lần). */
function onDecode(text){
  if(!seenSinceAccept) return;                         // mã vẫn còn trong khung -> bỏ qua
  var now=Date.now(); if(text===lastScan.value && (now-lastScan.t)<800) return; // chặn rung khung
  lastScan={value:text,t:now}; seenSinceAccept=false;
  if(scanCb) scanCb(text);
}
function onScanFail(){ seenSinceAccept=true; }          // không thấy mã -> sẵn sàng nhận mã kế tiếp
function stopScan(){ if(html5qr){ html5qr.stop().then(function(){html5qr.clear();}).catch(function(){}); html5qr=null; } document.getElementById('scanWrap').style.display='none'; }

/* ====================================================================
 * CẢNH BÁO + ÂM THANH + RUNG
 * ==================================================================== */
function flashAlert(kind,title,msg,autoClose){
  var o=document.getElementById('alertOverlay'); o.className=''; o.classList.add(kind==='good'?'a-good':(kind==='warn'?'a-warn':'a-bad'),'flashing'); o.style.display='flex';
  var ic=document.getElementById('alertIcon'); ic.className='pop'; ic.textContent=kind==='good'?'✓':(kind==='warn'?'⚠️':'⛔');
  document.getElementById('alertTitle').textContent=title; document.getElementById('alertMsg').textContent=msg;
  if(kind==='good'){ beep(true); navigator.vibrate&&navigator.vibrate(55); } else { beep(false); navigator.vibrate&&navigator.vibrate([120,60,120]); }
  o.querySelector('button').style.display=autoClose?'none':'';
  if(autoClose){ clearTimeout(window._aT); window._aT=setTimeout(closeAlert,1200); }
}
function closeAlert(){ document.getElementById('alertOverlay').style.display='none'; }
var _audio=null;
function beep(good){ try{ _audio=_audio||new (window.AudioContext||window.webkitAudioContext)(); var o=_audio.createOscillator(),g=_audio.createGain(); o.connect(g); g.connect(_audio.destination); o.type='square'; o.frequency.value=good?880:200; g.gain.value=.2; o.start(); if(!good)setTimeout(function(){o.frequency.value=160;},120); setTimeout(function(){o.stop();},good?140:380); }catch(e){} }
function nameOf(code){ return {INVALID_QR:'MÃ QR KHÔNG HỢP LỆ',WRONG_SKU:'SAI SKU',ENOUGH:'ĐÃ ĐỦ SỐ LƯỢNG',OVER_STOCK:'VƯỢT TỒN KHO',NO_STOCK:'HẾT TỒN / CHƯA ĐÓNG GÓI',INACTIVE:'SKU BỊ VÔ HIỆU'}[code]||code; }

/* ====================================================================
 * OFFLINE QUEUE
 * ==================================================================== */
function queuePush(item){ var q=JSON.parse(localStorage.getItem(CONFIG.queueKey)||'[]'); q.push(item); localStorage.setItem(CONFIG.queueKey,JSON.stringify(q)); updateNet(); }
async function flushQueue(){ if(!navigator.onLine)return; var q=JSON.parse(localStorage.getItem(CONFIG.queueKey)||'[]'); if(!q.length)return; var rest=[]; for(var i=0;i<q.length;i++){ try{ await api(q[i].action,q[i].payload); }catch(e){ rest.push(q[i]); } } localStorage.setItem(CONFIG.queueKey,JSON.stringify(rest)); updateNet(); }
function updateNet(){ var dot=document.getElementById('netDot'); if(!dot)return; var q=JSON.parse(localStorage.getItem(CONFIG.queueKey)||'[]');
  if(!navigator.onLine){ dot.style.color='#fca5a5'; dot.title='Offline'+(q.length?(' · '+q.length+' chờ'):''); } else { dot.style.color=q.length?'#f59e0b':'#22c55e'; dot.title=q.length?(q.length+' đang đồng bộ'):'Online'; if(q.length)flushQueue(); } }

/* ====================================================================
 * CHARTS & CSV
 * ==================================================================== */
function barChart(id,labels,data,color){ if(_chart[id])_chart[id].destroy(); _chart[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:color||'#1B356B',borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:60}},y:{beginAtZero:true}}}}); }
function lineChart(id,labels,a,b){ if(_chart[id])_chart[id].destroy(); _chart[id]=new Chart(document.getElementById(id),{type:'line',data:{labels:labels,datasets:[{label:'Nhập',data:a,borderColor:'#1B356B',backgroundColor:'#1B356B22',tension:.3,fill:true},{label:'Xuất',data:b,borderColor:'#15A34A',backgroundColor:'#15A34A22',tension:.3,fill:true}]},options:{scales:{x:{ticks:{font:{size:9}}},y:{beginAtZero:true}}}}); }
function exportCSV(rows,name){ if(!rows||!rows.length){alert('Không có dữ liệu');return;} var keys=Object.keys(rows[0]); var csv=[keys.join(',')].concat(rows.map(function(r){return keys.map(function(k){return '"'+String(r[k]).replace(/"/g,'""')+'"';}).join(',');})).join('\n'); var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }
</script>
