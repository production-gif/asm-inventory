<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AMERICAN STAR — WMS Nệm</title>

<!-- ===== THƯ VIỆN QUA CDN (open-source) ===== -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ===== MÀU THƯƠNG HIỆU — DỄ CHỈNH ===== */
  :root{
    --navy:#1E3A8A; --navy-d:#16225c; --red:#DC2626; --green:#16A34A;
    --amber:#F59E0B; --bg:#FAFAFA; --card:#FFFFFF; --line:#E5E7EB; --ink:#0F172A;
  }
  *{font-family:'Inter',system-ui,Arial,sans-serif}
  body{background:var(--bg);color:var(--ink);margin:0}
  .btn{min-height:56px;border-radius:14px;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center;gap:10px;transition:.12s;cursor:pointer;user-select:none}
  .btn:active{transform:scale(.97)}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-red{background:var(--red);color:#fff}
  .btn-green{background:var(--green);color:#fff}
  .btn-amber{background:var(--amber);color:#fff}
  .btn-ghost{background:#fff;border:2px solid var(--line);color:var(--ink)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .num{font-size:34px;font-weight:800;line-height:1}
  input,select{font-size:16px}
  .field{width:100%;min-height:52px;border:2px solid var(--line);border-radius:12px;padding:0 14px;background:#fff}
  table{border-collapse:collapse;width:100%}
  thead th{position:sticky;top:0;background:#fff;z-index:1}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:15px}
  .pill{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;display:inline-block}
  /* Scanner fullscreen */
  #scanWrap{position:fixed;inset:0;background:#000;z-index:60;display:none;flex-direction:column}
  #reader{flex:1;width:100%}
  /* Overlay cảnh báo đỏ */
  #alertOverlay{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;color:#fff}
  .a-bad{background:rgba(220,38,38,.97)} .a-good{background:rgba(22,163,74,.97)} .a-warn{background:rgba(245,158,11,.97)}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.55}}
  .flashing{animation:flash .5s linear 3}
  /* ===== IN TEM QR (@media print) — DỄ CHỈNH KÍCH THƯỚC ===== */
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{position:absolute;left:0;top:0}
    .label{page-break-after:always}
  }
  /* tem 50x30mm (mặc định) & 80x50mm */
  .label{display:flex;gap:3mm;align-items:center;border:0;color:#000}
  .label.s5030{width:50mm;height:30mm;padding:2mm}
  .label.s8050{width:80mm;height:50mm;padding:3mm}
  .label .qrbox canvas,.label .qrbox img{width:100%;height:100%}
  .label.s5030 .qrbox{width:26mm;height:26mm}
  .label.s8050 .qrbox{width:44mm;height:44mm}
  .label .meta{font-size:8pt;line-height:1.25}
  .label.s8050 .meta{font-size:10pt}
  .hide{display:none!important}
  .navbtn{padding:12px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#cbd5e1}
  .navbtn.active{background:var(--navy);color:#fff}
</style>
</head>
<body>

<!-- ============ 0. MÀN HÌNH CẤU HÌNH (lần đầu) ============ -->
<div id="screenConfig" class="hide" style="max-width:480px;margin:0 auto;padding:24px">
  <div class="text-center mb-6">
    <img src="./logo.png" onerror="this.style.display='none'" style="height:54px;margin:0 auto 8px">
    <div class="text-2xl font-extrabold" style="color:var(--navy)">AMERICAN STAR — WMS</div>
    <div class="text-slate-500">Cấu hình lần đầu</div>
  </div>
  <div class="card p-5">
    <label class="font-semibold">URL Web App (Apps Script)</label>
    <p class="text-sm text-slate-500 mb-2">Dán URL ".../exec" sau khi deploy backend.</p>
    <input id="cfgUrl" class="field mb-3" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="btn btn-navy w-full" onclick="saveConfig()">Lưu &amp; Kiểm tra kết nối</button>
    <div id="cfgMsg" class="text-center mt-3 text-sm"></div>
  </div>
</div>

<!-- ============ 1. MÀN HÌNH LOGIN ============ -->
<div id="screenLogin" class="hide" style="max-width:440px;margin:0 auto;padding:24px">
  <div class="text-center mb-5">
    <img src="./logo.png" onerror="this.style.display='none'" style="height:56px;margin:0 auto 8px">
    <div class="text-2xl font-extrabold" style="color:var(--navy)">AMERICAN STAR</div>
    <div class="text-slate-500">Quản lý Xuất Nhập Tồn kho nệm</div>
  </div>
  <div class="card p-5">
    <div class="font-semibold mb-2">Chọn vai trò</div>
    <div class="grid grid-cols-2 gap-3 mb-4" id="roleGrid"></div>
    <div class="font-semibold mb-2">Tài khoản</div>
    <input id="loginUser" class="field mb-3" placeholder="username" autocomplete="username">
    <div class="font-semibold mb-2">PIN</div>
    <input id="loginPin" class="field text-center tracking-[.5em] text-2xl mb-1" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="current-password">
    <div id="pinPad" class="grid grid-cols-3 gap-2 my-3"></div>
    <button class="btn btn-navy w-full" onclick="doLogin()">VÀO CA</button>
    <div id="loginMsg" class="text-center mt-3 text-sm" style="color:var(--red)"></div>
    <div class="text-center mt-4 text-xs text-slate-400 cursor-pointer" onclick="show('screenConfig')">⚙ Đổi URL máy chủ</div>
  </div>
</div>

<!-- ============ APP SHELL (sau khi login) ============ -->
<div id="app" class="hide">
  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-3 text-white" style="background:var(--navy)">
    <div class="flex items-center gap-2">
      <img src="./logo.png" onerror="this.style.display='none'" style="height:30px">
      <span class="font-extrabold tracking-wide">AMERICAN STAR</span>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <span id="netDot" title="trạng thái mạng">●</span>
      <span id="whoami" class="opacity-90"></span>
      <button onclick="logout()" class="bg-white/15 px-3 py-1 rounded-lg">Thoát</button>
    </div>
  </header>

  <main id="main" class="px-3 py-4 max-w-5xl mx-auto pb-28"></main>

  <!-- Bottom nav (mobile) / cũng dùng desktop -->
  <nav id="bottomNav" class="fixed bottom-0 inset-x-0 grid grid-cols-5 gap-1 p-2"
       style="background:var(--navy-d)"></nav>
</div>

<!-- ============ SCANNER FULLSCREEN ============ -->
<div id="scanWrap">
  <div class="flex items-center justify-between p-3 text-white">
    <div id="scanTitle" class="font-bold">Quét QR</div>
    <button class="bg-white/20 px-4 py-2 rounded-lg text-white font-bold" onclick="stopScan()">✕ Đóng</button>
  </div>
  <div id="reader"></div>
  <div id="scanHint" class="p-3 text-center text-white/80 text-sm">Đưa mã QR vào khung</div>
</div>

<!-- ============ OVERLAY CẢNH BÁO ============ -->
<div id="alertOverlay">
  <div id="alertIcon" style="font-size:72px">⚠️</div>
  <div id="alertTitle" class="text-3xl font-extrabold mt-2"></div>
  <div id="alertMsg" class="text-xl mt-3 max-w-md"></div>
  <button class="btn bg-white text-black mt-8 px-10" onclick="closeAlert()">ĐÃ HIỂU — TIẾP TỤC</button>
</div>

<!-- ============ KHU IN TEM (ẩn) ============ -->
<div id="printArea"></div>

<script>
/*************************************************************************
 * AMERICAN STAR WMS — FRONTEND (JS thuần)
 * Mọi cấu hình ở object CONFIG. KHÔNG hardcode URL ở đây — lưu localStorage.
 *************************************************************************/
var CONFIG = {
  endpointKey: 'as_wms_endpoint',     // localStorage key chứa URL Apps Script
  sessionKey:  'as_wms_session',      // session đăng nhập
  queueKey:    'as_wms_offline_queue',// hàng đợi offline
  cacheKey:    'as_wms_cache',        // cache danh mục
  dbl:         3000                   // chống double-scan (#6): bỏ qua quét trùng trong 3s
};
var ROLES = {
  packer:  {label:'Đóng gói',  icon:'📦', home:'inbound',   nav:['inbound']},
  picker:  {label:'Thủ kho',   icon:'🚚', home:'outbound',  nav:['outbound','inventory']},
  manager: {label:'Quản lý',   icon:'📊', home:'dashboard', nav:['dashboard','inventory','report','admin']},
  admin:   {label:'Admin',     icon:'⚙️', home:'dashboard', nav:['dashboard','inbound','outbound','inventory','report','admin']}
};
var NAV = {
  inbound:{label:'Đóng gói',icon:'📦'}, outbound:{label:'Xuất hàng',icon:'🚚'},
  inventory:{label:'Tồn kho',icon:'📋'}, dashboard:{label:'Tổng quan',icon:'📊'},
  report:{label:'Báo cáo',icon:'📈'}, admin:{label:'Quản trị',icon:'⚙️'}
};

var session = null, cache = {skus:[], inventory:[], vehicles:[], settings:{}}, currentView=null;
var lastScan = {value:'', t:0};

/* ---------- API ---------- */
function endpoint(){ return localStorage.getItem(CONFIG.endpointKey) || ''; }
async function api(action, payload){
  var url = endpoint();
  if(!url) throw new Error('Chưa cấu hình URL máy chủ');
  var body = JSON.stringify({action:action, token: session?session.token:'', payload: payload||{}});
  // body text/plain -> không kích hoạt CORS preflight
  var res = await fetch(url, {method:'POST', body:body, redirect:'follow'});
  var data = await res.json();
  if(!data.ok) throw new Error(data.error||'Lỗi máy chủ');
  return data;
}

/* ---------- KHỞI ĐỘNG ---------- */
window.addEventListener('load', function(){
  buildRoleGrid(); buildPinPad();
  window.addEventListener('online', updateNet); window.addEventListener('offline', updateNet);
  if(!endpoint()){ show('screenConfig'); return; }
  var s = localStorage.getItem(CONFIG.sessionKey);
  if(s){ session = JSON.parse(s); enterApp(); } else show('screenLogin');
});
function show(id){ ['screenConfig','screenLogin','app'].forEach(function(x){ document.getElementById(x).classList.add('hide'); }); document.getElementById(id).classList.remove('hide'); }

/* ---------- CẤU HÌNH ---------- */
function saveConfig(){
  var url = document.getElementById('cfgUrl').value.trim();
  var msg = document.getElementById('cfgMsg');
  if(!/^https:\/\/script\.google\.com\/.+\/exec$/.test(url)){ msg.style.color='var(--red)'; msg.textContent='URL phải dạng https://script.google.com/.../exec'; return; }
  localStorage.setItem(CONFIG.endpointKey, url);
  msg.style.color='var(--navy)'; msg.textContent='Đang kiểm tra...';
  api('ping').then(function(){ msg.style.color='var(--green)'; msg.textContent='Kết nối OK ✓'; setTimeout(function(){show('screenLogin');},700); })
             .catch(function(e){ msg.style.color='var(--red)'; msg.textContent='Lỗi: '+e.message; });
}

/* ---------- LOGIN ---------- */
var selectedRole='packer';
function buildRoleGrid(){
  var g=document.getElementById('roleGrid'); g.innerHTML='';
  Object.keys(ROLES).forEach(function(r){
    var b=document.createElement('button'); b.className='btn btn-ghost flex-col'; b.style.minHeight='72px';
    b.innerHTML='<div style="font-size:26px">'+ROLES[r].icon+'</div><div>'+ROLES[r].label+'</div>';
    b.onclick=function(){ selectedRole=r; [].forEach.call(g.children,function(c){c.classList.remove('btn-navy');c.classList.add('btn-ghost');}); b.classList.add('btn-navy'); b.classList.remove('btn-ghost'); };
    g.appendChild(b);
  });
  g.children[0].click();
}
function buildPinPad(){
  var pad=document.getElementById('pinPad'); pad.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','C','0','⌫'].forEach(function(k){
    var b=document.createElement('button'); b.className='btn btn-ghost'; b.textContent=k; b.style.minHeight='52px';
    b.onclick=function(){ var i=document.getElementById('loginPin');
      if(k==='C') i.value=''; else if(k==='⌫') i.value=i.value.slice(0,-1); else if(i.value.length<6) i.value+=k; };
    pad.appendChild(b);
  });
}
function doLogin(){
  var msg=document.getElementById('loginMsg'); msg.textContent='';
  var username=document.getElementById('loginUser').value.trim();
  var pin=document.getElementById('loginPin').value.trim();
  if(!username||!pin){ msg.textContent='Nhập tài khoản và PIN'; return; }
  api('login',{username:username,pin:pin,role:selectedRole}).then(function(d){
    session={username:d.username, role:d.role, token:d.token};
    localStorage.setItem(CONFIG.sessionKey, JSON.stringify(session));
    enterApp();
  }).catch(function(e){ msg.textContent=e.message; beep(false); });
}
function logout(){ localStorage.removeItem(CONFIG.sessionKey); session=null; document.getElementById('loginPin').value=''; show('screenLogin'); }

/* ---------- VÀO APP ---------- */
async function enterApp(){
  show('app'); updateNet();
  document.getElementById('whoami').textContent = session.username+' · '+ROLES[session.role].label;
  buildNav();
  try{ var b=await api('getBootstrap'); cache.skus=b.skus||[]; cache.inventory=b.inventory||[]; cache.vehicles=b.vehicles||[];
       cache.settings={}; (b.settings||[]).forEach(function(s){cache.settings[s.key]=s.value;});
       localStorage.setItem(CONFIG.cacheKey, JSON.stringify(cache)); }
  catch(e){ var c=localStorage.getItem(CONFIG.cacheKey); if(c) cache=JSON.parse(c); }
  flushQueue();
  go(ROLES[session.role].home);
}
function buildNav(){
  var nav=document.getElementById('bottomNav'); nav.innerHTML='';
  var items=ROLES[session.role].nav;
  nav.style.gridTemplateColumns='repeat('+items.length+',1fr)';
  items.forEach(function(v){
    var b=document.createElement('button'); b.className='navbtn'; b.id='nav_'+v;
    b.innerHTML='<div style="font-size:20px">'+NAV[v].icon+'</div>'+NAV[v].label;
    b.onclick=function(){ go(v); }; nav.appendChild(b);
  });
}
function go(view){
  currentView=view;
  [].forEach.call(document.querySelectorAll('.navbtn'),function(b){b.classList.remove('active');});
  var nb=document.getElementById('nav_'+view); if(nb) nb.classList.add('active');
  var m=document.getElementById('main'); m.innerHTML='<div class="text-center text-slate-400 py-10">Đang tải…</div>';
  ({inbound:viewInbound, outbound:viewOutbound, inventory:viewInventory,
    dashboard:viewDashboard, report:viewReport, admin:viewAdmin}[view]||viewInbound)(m);
}

/* ====================================================================
 * 2. ĐÓNG GÓI (INBOUND)
 * ==================================================================== */
function todayCountKey(){ return 'as_packcount_'+session.username+'_'+new Date().toISOString().slice(0,10); }
function viewInbound(m){
  var cnt = parseInt(localStorage.getItem(todayCountKey())||'0',10);
  m.innerHTML =
  '<div class="card p-4 mb-3 flex items-center justify-between">'+
    '<div><div class="text-slate-500">Hôm nay bạn đã đóng gói</div><div class="num" style="color:var(--navy)">'+cnt+' <span class="text-lg">cái</span></div></div>'+
    '<div style="font-size:40px">📦</div></div>'+
  '<button class="btn btn-navy w-full mb-3" style="min-height:84px;font-size:22px" onclick="startInboundScan()">📷 QUÉT QR NHẬP KHO</button>'+
  '<button class="btn btn-ghost w-full mb-4" style="min-height:64px" onclick="openCreateLabel()">🏷️ TẠO / IN TEM QR MỚI</button>'+
  '<div class="card p-3"><div class="font-semibold mb-2">Lượt nhập gần đây (máy này)</div><div id="recentIn" class="text-sm text-slate-600"></div></div>';
  renderRecentIn();
}
function renderRecentIn(){
  var r=JSON.parse(localStorage.getItem('as_recent_in')||'[]').slice(0,8);
  document.getElementById('recentIn').innerHTML = r.length? r.map(function(x){return '✓ '+x.t+' — '+x.sku;}).join('<br>') : 'Chưa có';
}
function startInboundScan(){
  openScanner('Quét QR — Nhập kho', function(code){
    handleInbound(code);
  });
}
async function handleInbound(code){
  var sku = code.trim();
  if(!navigator.onLine){ // OFFLINE: đưa vào hàng đợi, tạm tin
    queuePush({action:'inboundScan', payload:{sku_code:sku}});
    bumpInbound(sku); flashAlert('good','ĐÃ GHI (offline)', sku+' — sẽ đồng bộ khi có mạng'); return;
  }
  try{
    var d=await api('inboundScan',{sku_code:sku});
    if(d.valid){ bumpInbound(sku); flashAlert('good','✓ ĐÃ NHẬP KHO', (d.sku.product_name||sku)+' · Tồn: '+d.qty_in_stock); }
    else flashAlert('bad', nameOf(d.code), d.message);
  }catch(e){ flashAlert('bad','LỖI', e.message); }
}
function bumpInbound(sku){
  var k=todayCountKey(); localStorage.setItem(k, (parseInt(localStorage.getItem(k)||'0',10)+1));
  var r=JSON.parse(localStorage.getItem('as_recent_in')||'[]'); r.unshift({t:new Date().toTimeString().slice(0,8),sku:sku});
  localStorage.setItem('as_recent_in', JSON.stringify(r.slice(0,20)));
  if(currentView==='inbound') viewInbound(document.getElementById('main'));
}
/* ---- Tạo & in tem ---- */
function openCreateLabel(){
  var m=document.getElementById('main');
  var size=cache.settings.label_size||'50x30';
  m.innerHTML=
  '<button class="btn btn-ghost mb-3" onclick="go(\'inbound\')">← Quay lại</button>'+
  '<div class="card p-4">'+
    '<div class="font-semibold mb-2">Chọn SKU để in tem</div>'+
    '<input id="skuSearch" class="field mb-2" placeholder="Gõ tìm SKU..." oninput="filterSkuOptions()">'+
    '<select id="skuSelect" class="field mb-3" size="6" style="height:auto"></select>'+
    '<div class="grid grid-cols-2 gap-2 mb-3">'+
      '<div><label class="text-sm">Số lượng tem</label><input id="lblQty" type="number" value="1" min="1" class="field"></div>'+
      '<div><label class="text-sm">Khổ tem</label><select id="lblSize" class="field">'+
        '<option value="50x30"'+(size==='50x30'?' selected':'')+'>50×30 mm</option>'+
        '<option value="80x50"'+(size==='80x50'?' selected':'')+'>80×50 mm</option></select></div>'+
    '</div>'+
    '<div id="qrPreview" class="flex justify-center my-3"></div>'+
    '<button class="btn btn-navy w-full" onclick="printLabels()">🖨️ IN TEM</button>'+
  '</div>';
  filterSkuOptions();
  document.getElementById('skuSelect').onchange=previewQR;
}
function filterSkuOptions(){
  var q=(document.getElementById('skuSearch').value||'').toLowerCase();
  var sel=document.getElementById('skuSelect'); sel.innerHTML='';
  cache.skus.filter(function(s){return String(s.active)!=='false' && (s.sku_code+' '+s.product_name).toLowerCase().indexOf(q)>=0;})
    .slice(0,100).forEach(function(s){ var o=document.createElement('option'); o.value=s.sku_code; o.textContent=s.sku_code; sel.appendChild(o); });
  if(sel.options.length){ sel.selectedIndex=0; previewQR(); }
}
function previewQR(){
  var box=document.getElementById('qrPreview'); box.innerHTML='';
  var v=document.getElementById('skuSelect').value; if(!v) return;
  var d=document.createElement('div'); box.appendChild(d);
  new QRCode(d,{text:(cache.settings.qr_prefix||'')+v, width:140, height:140, correctLevel:QRCode.CorrectLevel.M});
}
function printLabels(){
  var sku=document.getElementById('skuSelect').value; if(!sku){alert('Chọn SKU');return;}
  var qty=Math.max(1,parseInt(document.getElementById('lblQty').value||'1',10));
  var size=document.getElementById('lblSize').value;
  var s=cache.skus.filter(function(x){return x.sku_code===sku;})[0]||{product_name:sku};
  var area=document.getElementById('printArea'); area.innerHTML='';
  var date=new Date().toISOString().slice(0,10);
  for(var i=0;i<qty;i++){
    var wrap=document.createElement('div'); wrap.className='label s'+size.replace('x','');
    var qb=document.createElement('div'); qb.className='qrbox'; wrap.appendChild(qb);
    new QRCode(qb,{text:(cache.settings.qr_prefix||'')+sku, width:300, height:300, correctLevel:QRCode.CorrectLevel.M});
    var meta=document.createElement('div'); meta.className='meta';
    meta.innerHTML='<b>'+(s.product_name||sku)+'</b><br>'+(s.size||'')+(s.thickness?(' · '+s.thickness):'')+'<br>'+sku+'<br>ĐG: '+date;
    wrap.appendChild(meta); area.appendChild(wrap);
  }
  window.print();
}

/* ====================================================================
 * 3. XUẤT HÀNG / LOADING (OUTBOUND)
 * ==================================================================== */
var activeLoading=null;
async function viewOutbound(m){
  var today=new Date().toISOString().slice(0,10);
  var lds=[];
  try{ lds=(await api('getLoadings',{date:today})).items; }catch(e){}
  m.innerHTML=
  '<div class="flex items-center justify-between mb-3"><div class="text-xl font-bold">Loading hôm nay</div>'+
    '<button class="btn btn-navy px-4" style="min-height:48px" onclick="openCreateLoading()">+ Tạo Loading</button></div>'+
  '<div id="loadingList"></div>';
  var list=document.getElementById('loadingList');
  list.innerHTML = lds.length? '' : '<div class="card p-6 text-center text-slate-400">Chưa có loading. Bấm “+ Tạo Loading”.</div>';
  lds.forEach(function(l){
    var d=document.createElement('div'); d.className='card p-4 mb-2 flex items-center justify-between cursor-pointer';
    d.onclick=function(){ openLoading(l.loading_id); };

async function openCreateLoading(){

function renderSOpick(list){

      '<div class="flex-1"><div class="font-semibold">'+s.so_number+' — '+s.customer+'</div>'+
      '<div class="text-sm text-slate-500">Giao: '+(s.delivery_date||'-')+' · '+s.qty_ordered+' cái · '+s.lines+' dòng</div></div>';

  });

function filterSO(q){ q=(q||'').toLowerCase(); renderSOpick((window._openSOs||[]).filter(function(s){return (s.so_number+' '+s.customer).toLowerCase().indexOf(q)>=0;})); }
function selectedSOs(){ return [].map.call(document.querySelectorAll('.soChk:checked'),function(c){return c.value;}); }
function recalcEst(){
  var sel=selectedSOs(); var sos=window._openSOs||[];
  var qty=sos.filter(function(s){return sel.indexOf(s.so_number)>=0;}).reduce(function(a,s){return a+s.qty_ordered;},0);
  var veh=cache.vehicles.filter(function(v){return v.vehicle_id===document.getElementById('ldVehicle').value;})[0];
  var cap=veh?parseFloat(veh.capacity_m3)||0:0;
  // ước tính thể tích từ cache SKU
  var vol=0; var skuMap={}; cache.skus.forEach(function(s){skuMap[s.sku_code]=s;});
  // cần chi tiết dòng -> ước tính nhanh theo qty (chi tiết chính xác tính ở server). Hiển thị qty + cap.
  document.getElementById('estVol').textContent = 'Đã chọn '+sel.length+' SO · '+qty+' cái'+(cap?(' · sức chứa xe '+cap+' m³'):'');
}
async function submitLoading(){
  var sel=selectedSOs(); if(!sel.length){ alert('Chọn ít nhất 1 SO'); return; }
  var veh=document.getElementById('ldVehicle').value;
  try{ var d=await api('createLoading',{vehicle_id:veh, so_list:sel});
    openLoading(d.loading_id);
  }catch(e){ alert(e.message); }
}
async function openLoading(id){
  activeLoading=id; var m=document.getElementById('main');
  m.innerHTML='<div class="text-center text-slate-400 py-10">Đang tải loading…</div>';
  var d; try{ d=await api('getLoading',{loading_id:id}); }catch(e){ m.innerHTML='<div class="card p-4">'+e.message+'</div>'; return; }
  renderLoading(d);
}
function renderLoading(d){
  var m=document.getElementById('main'); var ld=d.loading;
  var pct=d.fill_percent||0; var barColor = pct>100?'var(--red)':(pct>90?'var(--amber)':'var(--green)');
  var rows=d.table.map(function(t){
    var done=t.scanned>=t.ordered;
    return '<tr><td>'+t.product_name+'<div class="text-xs text-slate-400">'+t.sku_code+'</div></td>'+
      '<td class="text-center"><b style="color:'+(done?'var(--green)':'var(--navy)')+'">'+t.scanned+'/'+t.ordered+'</b></td>'+
      '<td class="text-center">'+(done?'✓':'')+'</td></tr>';
  }).join('');
  var allDone = d.table.every(function(t){return t.scanned>=t.ordered;}) && d.table.length>0;
  m.innerHTML=
  '<button class="btn btn-ghost mb-3" onclick="go(\'outbound\')">← Danh sách loading</button>'+
  '<div class="card p-4 mb-3"><div class="flex justify-between items-center"><div class="font-bold text-lg">'+ld.loading_id+'</div>'+
    '<div class="text-sm text-slate-500">Xe: '+(ld.vehicle_id||'-')+'</div></div>'+
    '<div class="mt-2 text-sm text-slate-600">Thể tích đã xếp: <b>'+d.scanned_volume_m3+' m³</b> / '+d.capacity_m3+' m³ (ước tính đơn: '+d.estimate_volume_m3+' m³)</div>'+
    '<div style="background:#eee;border-radius:999px;height:14px;margin-top:6px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div></div>'+
    '<div class="text-right text-sm font-bold" style="color:'+barColor+'">'+pct+'%'+(pct>100?' — QUÁ TẢI!':'')+'</div></div>'+
  (ld.status==='done'?'<div class="card p-3 mb-3 text-center" style="background:#dcfce7;color:#166534">✓ Loading đã hoàn tất</div>':
   '<button class="btn btn-navy w-full mb-3" style="min-height:80px;font-size:22px" onclick="startOutboundScan()">📷 QUÉT XUẤT HÀNG</button>')+
  '<div class="card overflow-hidden mb-3"><table><thead><tr><th>Sản phẩm</th><th class="text-center">Quét/Cần</th><th class="text-center">Đủ</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
  (ld.status!=='done'?'<button class="btn '+(allDone?'btn-green':'btn-ghost')+' w-full" onclick="completeLoading()">'+(allDone?'✓ HOÀN TẤT LOADING':'Hoàn tất (chưa đủ số lượng)')+'</button>':'');
}
function startOutboundScan(){
  openScanner('Quét xuất — '+activeLoading, function(code){ handleOutbound(code); });
}
async function handleOutbound(code){
  var sku=code.trim();
  if(!navigator.onLine){ flashAlert('warn','OFFLINE','Khâu xuất cần mạng để kiểm tra. Vui lòng kết nối mạng.'); return; }
  try{
    var d=await api('outboundScan',{loading_id:activeLoading, sku_code:sku});
    if(d.valid){
      flashAlert('good','✓ OK', (d.sku.product_name||sku)+'\nSO '+d.so_number+' · '+d.scanned+'/'+d.ordered+' · '+d.fill_percent+'% xe', true);
      // cập nhật bảng nền
      api('getLoading',{loading_id:activeLoading}).then(renderLoading).catch(function(){});
    } else {
      flashAlert('bad', nameOf(d.code), d.message);   // overlay đỏ + beep + rung (trong flashAlert)
    }
  }catch(e){ flashAlert('bad','LỖI', e.message); }
}
async function completeLoading(){
  if(!confirm('Hoàn tất loading này? Sẽ cập nhật SO và tồn kho.')) return;
  try{ var d=await api('completeLoading',{loading_id:activeLoading});
    flashAlert('good','✓ HOÀN TẤT','Đã xếp '+d.total_volume_m3+' m³'); setTimeout(function(){go('outbound');},900);
  }catch(e){ flashAlert('bad','LỖI', e.message); }
}

async function viewInventory(m){

  var skuMap={}; cache.skus.forEach(function(s){skuMap[s.sku_code]=s;});
  window._inv = cache.inventory.map(function(r){ var s=skuMap[r.sku_code]||{}; return {
    sku_code:r.sku_code, name:s.product_name||r.sku_code, size:s.size||'', line:s.line||'',
    in_stock:+r.qty_in_stock||0, shipped:+r.qty_shipped_total||0, created:+r.qty_created_total||0, vol:s.volume_m3||''
  };});
  m.innerHTML=
  '<div class="flex flex-wrap gap-2 mb-3 items-center">'+
    '<input id="invSearch" class="field" style="flex:1;min-width:160px" placeholder="🔍 Tìm SKU / sản phẩm..." oninput="renderInv()">'+
    '<button class="btn btn-ghost px-4" style="min-height:52px" onclick="exportCSV(window._inv,\'tonkho.csv\')">⬇ CSV</button></div>'+
  '<div class="card overflow-auto"><table><thead><tr>'+
    '<th onclick="sortInv(\'name\')">Sản phẩm</th><th>Size</th>'+
    '<th class="text-center" onclick="sortInv(\'in_stock\')">Tồn</th>'+
    '<th class="text-center" onclick="sortInv(\'shipped\')">Đã xuất</th>'+
    '<th class="text-center" onclick="sortInv(\'created\')">Đã tạo</th><th class="text-center">m³/cái</th></tr></thead>'+
    '<tbody id="invBody"></tbody></table></div>';
  renderInv();
}
var _invSort={k:'name',dir:1};
function sortInv(k){ _invSort.dir = (_invSort.k===k? -_invSort.dir:1); _invSort.k=k; renderInv(); }
function renderInv(){
  var q=(document.getElementById('invSearch').value||'').toLowerCase();
  var rows=(window._inv||[]).filter(function(r){return (r.sku_code+' '+r.name).toLowerCase().indexOf(q)>=0;});
  rows.sort(function(a,b){ var x=a[_invSort.k],y=b[_invSort.k]; if(typeof x==='string'){return _invSort.dir*x.localeCompare(y);} return _invSort.dir*(x-y); });
  document.getElementById('invBody').innerHTML = rows.map(function(r){
    var low = r.in_stock < (parseInt(cache.settings.reorder_threshold||'10',10));
    return '<tr class="cursor-pointer" onclick="skuDetail(\''+r.sku_code.replace(/'/g,"\\'")+'\')"><td>'+r.name+'<div class="text-xs text-slate-400">'+r.sku_code+'</div></td><td>'+r.size+'</td>'+
      '<td class="text-center"><b style="color:'+(low?'var(--red)':'var(--navy)')+'">'+r.in_stock+'</b></td>'+
      '<td class="text-center">'+r.shipped+'</td><td class="text-center">'+r.created+'</td><td class="text-center">'+(r.vol||'-')+'</td></tr>';
  }).join('') || '<tr><td colspan="6" class="text-center text-slate-400 py-6">Không có dữ liệu</td></tr>';
}
function skuDetail(sku){
  alert('SKU: '+sku+'\n(Chi tiết lịch sử quét xem ở màn Báo cáo theo ngày.)');
}

  }catch(e){ document.getElementById('skMsg').style.color='var(--red)'; document.getElementById('skMsg').textContent=e.message; }

function adminVehicle(){
  var b=document.getElementById('adminBody');
  b.innerHTML=
  '<div class="card p-4 mb-3"><div class="font-semibold mb-2">Thêm xe</div>'+
    '<input id="vh_name" class="field mb-2" placeholder="Tên xe"><input id="vh_plate" class="field mb-2" placeholder="Biển số">'+
    '<input id="vh_cap" type="number" class="field mb-2" placeholder="Sức chứa (m³)">'+
    '<button class="btn btn-navy w-full" onclick="saveVehicle()">Lưu xe</button></div>'+
  '<div class="card p-3"><div id="vehList"></div></div>';
  renderVeh();
}
function renderVeh(){ document.getElementById('vehList').innerHTML = cache.vehicles.map(function(v){return '<div class="flex justify-between border-b py-2"><div>'+v.vehicle_name+' <span class="text-slate-400 text-sm">'+(v.plate_no||'')+'</span></div><b>'+v.capacity_m3+' m³</b></div>';}).join('')||'<div class="text-slate-400 text-center py-3">Chưa có xe</div>'; }
async function saveVehicle(){ try{ await api('saveVehicle',{vehicle_name:document.getElementById('vh_name').value,plate_no:document.getElementById('vh_plate').value,capacity_m3:document.getElementById('vh_cap').value});
  await refreshCache(); renderVeh(); document.getElementById('vh_name').value=''; document.getElementById('vh_cap').value=''; }catch(e){alert(e.message);} }
function adminUser(){
  var b=document.getElementById('adminBody');
  b.innerHTML=
  '<div class="card p-4 mb-3"><div class="font-semibold mb-2">Thêm / Sửa user</div>'+
    '<input id="us_name" class="field mb-2" placeholder="username"><input id="us_pin" class="field mb-2" placeholder="PIN (để trống nếu không đổi)">'+
    '<select id="us_role" class="field mb-2"><option value="packer">Đóng gói</option><option value="picker">Thủ kho</option><option value="manager">Quản lý</option><option value="admin">Admin</option></select>'+
    '<button class="btn btn-navy w-full" onclick="saveUser()">Lưu user</button></div>'+
  '<div class="card p-3"><div id="userList"></div></div>';
  loadUsers();
}
async function loadUsers(){ try{ var u=(await api('getUsers')).items; document.getElementById('userList').innerHTML=u.map(function(x){return '<div class="flex justify-between border-b py-2"><div>'+x.username+' <span class="pill" style="background:#eef;color:var(--navy)">'+x.role+'</span></div><span class="text-sm '+(String(x.active)==='false'?'text-red-500':'text-green-600')+'">'+(String(x.active)==='false'?'khóa':'hoạt động')+'</span></div>';}).join(''); }catch(e){ document.getElementById('userList').innerHTML=e.message; } }
async function saveUser(){ try{ await api('saveUser',{username:document.getElementById('us_name').value,pin:document.getElementById('us_pin').value,role:document.getElementById('us_role').value});
  loadUsers(); document.getElementById('us_name').value=''; document.getElementById('us_pin').value=''; }catch(e){alert(e.message);} }
function adminImport(){
  document.getElementById('adminBody').innerHTML=
  '<div class="card p-4"><div class="font-semibold mb-2">Import Sales Order từ CSV</div>'+
    '<p class="text-sm text-slate-500 mb-2">File ERP "Sales Order Summary". Cột nhận tự động: SO #, Customer, Product Number, Description, Ordered Qty, Order Status… Báo giá (Estimate) tự bỏ qua.</p>'+
    '<input type="file" id="soFile" accept=".csv" class="field mb-2" style="padding-top:12px">'+
    '<button class="btn btn-navy w-full" onclick="doImportSO()">Import</button><div id="impMsg" class="text-center text-sm mt-2"></div></div>';
}
function doImportSO(){
  var f=document.getElementById('soFile').files[0]; if(!f){alert('Chọn file CSV');return;}
  var msg=document.getElementById('impMsg'); msg.style.color='var(--navy)'; msg.textContent='Đang đọc file…';
  var rd=new FileReader();
  rd.onload=function(){ api('importSO',{csvText:rd.result}).then(function(d){ msg.style.color='var(--green)';
    msg.textContent='✓ '+d.total_so+' SO, +'+d.added_lines+' dòng, +'+d.added_sku+' SKU mới'; refreshCache(); })
    .catch(function(e){ msg.style.color='var(--red)'; msg.textContent=e.message; }); };
  rd.readAsText(f);
}
function adminSettings(){
  var s=cache.settings;
  document.getElementById('adminBody').innerHTML=
  '<div class="card p-4"><div class="font-semibold mb-3">Cài đặt</div>'+
    '<label class="text-sm">Ngưỡng tồn cảnh báo (mặc định)</label><input id="set_thr" class="field mb-2" value="'+(s.reorder_threshold||'10')+'">'+
    '<label class="text-sm">Khổ tem mặc định</label><select id="set_lbl" class="field mb-2"><option value="50x30"'+(s.label_size==='50x30'?' selected':'')+'>50×30 mm</option><option value="80x50"'+(s.label_size==='80x50'?' selected':'')+'>80×50 mm</option></select>'+
    '<label class="text-sm">Tiền tố QR (thường để trống)</label><input id="set_pre" class="field mb-3" value="'+(s.qr_prefix||'')+'">'+
    '<button class="btn btn-navy w-full" onclick="saveSettings()">Lưu cài đặt</button><div id="setMsg" class="text-center text-sm mt-2"></div></div>';
}
async function saveSettings(){ try{ await api('saveSettings',{values:{reorder_threshold:document.getElementById('set_thr').value,label_size:document.getElementById('set_lbl').value,qr_prefix:document.getElementById('set_pre').value}});
  await refreshCache(); document.getElementById('setMsg').style.color='var(--green)'; document.getElementById('setMsg').textContent='Đã lưu ✓'; }catch(e){ document.getElementById('setMsg').textContent=e.message; } }
async function refreshCache(){ var b=await api('getBootstrap'); cache.skus=b.skus||[]; cache.inventory=b.inventory||[]; cache.vehicles=b.vehicles||[]; cache.settings={}; (b.settings||[]).forEach(function(s){cache.settings[s.key]=s.value;}); localStorage.setItem(CONFIG.cacheKey, JSON.stringify(cache)); }

/* ====================================================================
 * SCANNER (html5-qrcode)
 * ==================================================================== */
var html5qr=null, scanCb=null;
function openScanner(title, cb){
  scanCb=cb; document.getElementById('scanTitle').textContent=title;
  document.getElementById('scanWrap').style.display='flex';
  html5qr=new Html5Qrcode('reader');
  html5qr.start({facingMode:'environment'}, {fps:10, qrbox:{width:250,height:250}}, onDecode, function(){})
    .catch(function(e){ flashAlert('bad','LỖI CAMERA', e.message||'Không mở được camera. Cần HTTPS và cấp quyền camera.'); stopScan(); });
}
function onDecode(text){
  var now=Date.now();
  // ĐIỂM CHẶN #6: bỏ qua quét trùng trong 3 giây
  if(text===lastScan.value && (now-lastScan.t)<CONFIG.dbl) return;
  lastScan={value:text, t:now};
  if(scanCb) scanCb(text);
}
function stopScan(){
  if(html5qr){ html5qr.stop().then(function(){html5qr.clear();}).catch(function(){}); html5qr=null; }
  document.getElementById('scanWrap').style.display='none';
}

/* ====================================================================
 * OVERLAY CẢNH BÁO + ÂM THANH + RUNG
 * ==================================================================== */
function flashAlert(kind, title, msg, autoClose){
  var o=document.getElementById('alertOverlay');
  o.className=''; o.classList.add(kind==='good'?'a-good':(kind==='warn'?'a-warn':'a-bad'),'flashing');
  o.style.display='flex';
  document.getElementById('alertIcon').textContent = kind==='good'?'✓':(kind==='warn'?'⚠️':'⛔');
  document.getElementById('alertTitle').textContent=title;
  document.getElementById('alertMsg').textContent=msg;
  if(kind==='good'){ beep(true); navigator.vibrate&&navigator.vibrate(60); }
  else { beep(false); navigator.vibrate&&navigator.vibrate([120,60,120]); }
  o.querySelector('button').style.display = autoClose? 'none':'';
  if(autoClose){ clearTimeout(window._aT); window._aT=setTimeout(closeAlert, 1200); }
}
function closeAlert(){ document.getElementById('alertOverlay').style.display='none'; }
var _audio=null;
function beep(good){
  try{ _audio=_audio||new (window.AudioContext||window.webkitAudioContext)();
    var o=_audio.createOscillator(), g=_audio.createGain(); o.connect(g); g.connect(_audio.destination);
    o.type='square'; o.frequency.value=good?880:200; g.gain.value=0.2; o.start();
    if(!good){ setTimeout(function(){o.frequency.value=160;},120); }
    setTimeout(function(){o.stop();}, good?140:380);
  }catch(e){}
}
function nameOf(code){ return {INVALID_QR:'MÃ QR KHÔNG HỢP LỆ',WRONG_SKU:'SAI SKU',ENOUGH:'ĐÃ ĐỦ SỐ LƯỢNG',OVER_STOCK:'VƯỢT TỒN KHO',NO_STOCK:'HẾT TỒN / CHƯA ĐÓNG GÓI',INACTIVE:'SKU BỊ VÔ HIỆU'}[code]||code; }

/* ====================================================================
 * OFFLINE QUEUE (đồng bộ khi có mạng)
 * ==================================================================== */
function queuePush(item){ var q=JSON.parse(localStorage.getItem(CONFIG.queueKey)||'[]'); q.push(item); localStorage.setItem(CONFIG.queueKey, JSON.stringify(q)); updateNet(); }
async function flushQueue(){
  if(!navigator.onLine) return;
  var q=JSON.parse(localStorage.getItem(CONFIG.queueKey)||'[]'); if(!q.length) return;
  var rest=[];
  for(var i=0;i<q.length;i++){ try{ await api(q[i].action, q[i].payload); }catch(e){ rest.push(q[i]); } }
  localStorage.setItem(CONFIG.queueKey, JSON.stringify(rest)); updateNet();
}
function updateNet(){
  var dot=document.getElementById('netDot'); if(!dot) return;
  var q=JSON.parse(localStorage.getItem(CONFIG.queueKey)||'[]');
  if(!navigator.onLine){ dot.style.color='#fca5a5'; dot.title='Offline'+(q.length?(' · '+q.length+' chờ'):''); }
  else { dot.style.color= q.length? '#fde047':'#86efac'; dot.title= q.length? (q.length+' đang đồng bộ'):'Online'; if(q.length) flushQueue(); }
}

/* ====================================================================
 * CHARTS & CSV
 * ==================================================================== */
function barChart(id, labels, data, label){ if(_chart[id])_chart[id].destroy();
  _chart[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels:labels,datasets:[{label:label,data:data,backgroundColor:'#1E3A8A'}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:60}}}}}); }
function lineChart(id, labels, a, b){ if(_chart[id])_chart[id].destroy();
  _chart[id]=new Chart(document.getElementById(id),{type:'line',data:{labels:labels,datasets:[
    {label:'Nhập',data:a,borderColor:'#1E3A8A',tension:.3},{label:'Xuất',data:b,borderColor:'#16A34A',tension:.3}]},
    options:{scales:{x:{ticks:{font:{size:9}}}}}}); }
function exportCSV(rows, name){
  if(!rows||!rows.length){alert('Không có dữ liệu');return;}
  var keys=Object.keys(rows[0]);
  var csv=[keys.join(',')].concat(rows.map(function(r){return keys.map(function(k){return '"'+String(r[k]).replace(/"/g,'""')+'"';}).join(',');})).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
}
