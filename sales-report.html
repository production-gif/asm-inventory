<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Report Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f6f9;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            min-width: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .card h3 {
            margin: 0;
            color: #666;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
        }

        .chart-container {
            background: white;
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Sales Report Dashboard</h1>
</div>

<div class="cards">
    <div class="card">
        <h3>Total Revenue</h3>
        <p>$120,000</p>
    </div>

    <div class="card">
        <h3>Total Orders</h3>
        <p>850</p>
    </div>

    <div class="card">
        <h3>Customers</h3>
        <p>320</p>
    </div>

    <div class="card">
        <h3>Growth</h3>
        <p>15%</p>
    </div>
</div>

<div class="chart-container">
    <canvas id="salesChart"></canvas>
</div>

<script>
const ctx = document.getElementById('salesChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [
            'Jan','Feb','Mar',
            'Apr','May','Jun'
        ],
        datasets: [{
            label: 'Revenue',
            data: [
                12000,15000,18000,
                22000,25000,28000
            ],
            backgroundColor: '#007bff'
        }]
    }
});
</script>

</body>
</html>
